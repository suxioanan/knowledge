server:
  port: 8090
  servlet:
    context-path: /api


spring:
  application:
    name: knowledge-base

  # AI 配置
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: qwen3:14b
        options:
          temperature: 0.3
          num-predict: 2048
      embedding:
        model: bge-m3

    vectorstore:
      qdrant:
        host: 172.16.41.107
        port: 6334
        api-key: ${QDRANT_API_KEY:1234567890987654321}
        collection-name: knowledge
        initialize-schema: true

  # Actuator 监控端点
  management:
    endpoints:
      web:
        exposure:
          include: health,metrics,prometheus
    metrics:
      export:
        prometheus:
          enabled: true
      tags:
        application: knowledge-base
    endpoint:
      health:
        show-details: when-authorized

# ========== 应用自定义配置 ==========
app:
  # 安全配置
  security:
    api-key: ${APP_API_KEY:}
    admin:
      username: ${APP_ADMIN_USERNAME:admin}
      password: ${APP_ADMIN_PASSWORD:admin}
  # 限流配置
  rate-limit:
    enabled: true
    requests-per-minute: 60
    admin-requests-per-minute: 300
    ip-whitelist: 127.0.0.1,::1
  # 增量同步定时任务
  sync:
    index-path: ${APP_SYNC_INDEX_PATH:sync-index.properties}
    enabled: false
    cron: "0 0 3 * * *"
  # Agent 能力开关
  agent:
    enabled: true
  # 导入配置
  import:
    batch-size: 200
    parallel-threads: 3
    docs-dir: docs
  # 检索配置
  retrieval:
    top-k: 5
    similarity-threshold: 0.7
    neighbor-chunks: 1

# 日志配置
logging:
  level:
    org.springframework.ai: INFO
    com.yt.knowledge: DEBUG
